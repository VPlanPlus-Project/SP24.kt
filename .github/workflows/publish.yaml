on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prepare test access environment
        env:
          ACCESS_CSV: ${{ secrets.ACCESS_CSV }}
        run: |
          cat <<EOF > ${GITHUB_WORKSPACE}/library/access.csv
          $ACCESS_CSV
          EOF

      - name: Extract Version from Tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}  # Remove "v"-prefix
          echo "Extracted version: $VERSION"
          echo "Extracted tag name: $TAG_NAME"
          echo "version=$VERSION" >> ${GITHUB_WORKSPACE}/gradle.properties

      - name: Run tests
        run: ./gradlew jvmTest --stacktrace

      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/

      - name: Publish to maven registry
        run: ./gradlew publish --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}